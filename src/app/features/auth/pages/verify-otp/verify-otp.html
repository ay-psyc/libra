<div class="flex justify-center items-center h-screen">
  <div class="w-80">
    <p class="text-xl font-medium mb-3 text-start">Enter Verification Code</p>
    <p class="text-xs mb-5 text-gray-500">We've sent a 6-digit code to your email. Enter it below to verify your
      identity and proceed.</p>

    <div class="mb-5">
      <label class="mb-1 block text-sm" for="otp">Verification Code</label>
      <input class="w-full mb-2" type="number" id="otp" pInputText pSize="small" placeholder="******">
      <div class="text-xs text-gray-400">(This code will expire in 7 minutes. Please verify before it runs out.)</div>
    </div>

    <button class="bg-black text-white py-2 w-full rounded-md font-medium mb-5 cursor-pointer">Verify</button>
  </div>
</div>
