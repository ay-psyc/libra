<div class="flex justify-center items-center h-screen">
  <div class="w-80">
    <p class="text-xl font-medium mb-3 text-start">Forgot your password?</p>
    <p class="text-xs mb-5 text-gray-500">We'll send a password reset link straight to your inbox. Just enter your
      email below.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-5">
        <label class="mb-1 block text-sm" for="email">Email</label>
        <input formControlName="email" class="w-full" type="email" id="email" pInputText pSize="small"
               placeholder="libra.xy@gmail.com"
               [invalid]="hasError('email')">
        @if (hasError('email', 'required')) {
          <span class="text-red-500 text-xs mt-1 block">Email is required</span>
        } @else if (hasError('email', 'email')) {
          <span class="text-red-500 text-xs mt-1 block">Invalid email address</span>
        }
      </div>

      <button class="bg-black text-white py-2 w-full rounded-md font-medium mb-5 cursor-pointer">Submit</button>
    </form>

    <p class="text-center text-sm">Remember the password? <a routerLink="/login" class="text-blue-500">Sign
      In</a></p>
  </div>
</div>
