<div class="flex justify-center items-center h-screen">
  <div class="w-80">
    <p class="text-xl font-medium mb-3 text-start">Reset Your Password</p>
    <p class="text-xs mb-5 text-gray-500">Choose a strong new password to protect your account and keep your reading
      journey safe.</p>

    <div class="mb-3">
      <label class="mb-1 block text-sm" for="password">Password</label>
      <input class="w-full mb-2" type="password" id="password" pInputText pSize="small" placeholder="********">
      <div class="text-xs text-gray-400">(Password should be at least 15 characters
        OR at least 8 characters including a number and a lowercase letter.)
      </div>
    </div>

    <div class="mb-5">
      <label class="mb-1 block text-sm" for="confirmPassword">Confirm Password</label>
      <input class="w-full mb-2" type="password" id="confirmPassword" pInputText pSize="small" placeholder="********">
    </div>

    <button class="bg-black text-white py-2 w-full rounded-md font-medium mb-5 cursor-pointer">Reset Password</button>
  </div>
</div>
