<div class="flex justify-center items-center h-screen">
  <div class="w-80">
    <p class="text-xl font-medium mb-3 text-start">Welcome to Libra!</p>
    <p class="text-xs mb-5 text-gray-500">Log in to rediscover your books, continue your progress, and keep the
      knowledge flowing.</p>

    <div class="mb-3">
      <label class="mb-1 block text-sm" for="email">Email</label>
      <input class="w-full" type="email" id="email" pInputText pSize="small" placeholder="libra.xy@gmail.com">
    </div>

    <div class="mb-5">
      <div class="flex justify-between">
        <label class="mb-1 block text-sm" for="password">Password</label>
        <a routerLink="/forgot-password" class="text-sm text-blue-500">Forgot Password?</a>
      </div>
      <input class="w-full" type="password" id="password" pInputText pSize="small" placeholder="************">
    </div>

    <button class="bg-black text-white py-2 w-full rounded-md font-medium mb-5 cursor-pointer">Login</button>

    <p class="text-center text-sm">Don't have an account? <a routerLink="/register" class="text-blue-500">Sign
      Up</a></p>
  </div>
</div>
